name: GdalBindings
description: Generated FFI bindings for the GDAL C API.
output: lib/src/bindings/gdal_bindings.dart
compiler-opts:
  - '-I/usr/include/gdal'
headers:
  entry-points:
    - /usr/include/gdal/gdal.h
    - /usr/include/gdal/cpl_error.h
  include-directives:
    - /usr/include/gdal/gdal.h
    - /usr/include/gdal/cpl_error.h
    - /usr/include/gdal/cpl_port.h
preamble: |
  // Generated by ffigen — do not edit manually.
  // Regenerate via: dart run ffigen
functions:
  include:
    - GDALAllRegister
    - GDALOpenEx
    - GDALClose
    - GDALGetRasterXSize
    - GDALGetRasterYSize
    - GDALGetRasterCount
    - GDALGetProjectionRef
    - GDALGetGeoTransform
    - GDALGetRasterBand
    - GDALGetRasterDataType
    - GDALGetRasterNoDataValue
    - GDALGetBlockSize
    - GDALRasterIO
    - GDALVersionInfo
    - GDALGetDriverCount
    - CPLGetLastErrorMsg
    - CPLGetLastErrorNo
    - CPLGetLastErrorType
enums:
  include:
    - GDALDataType
    - GDALAccess
    - GDALRWFlag
    - CPLErr
